<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consola de Agente - Renovar Financiera</title>
    
    <!-- Librerías para poder arrastrar y redimensionar -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

    <style>
        /* Fondo de pantalla completa para Issabel */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f5f5f5; }
        #issabel-frame { width: 100%; height: 100%; border: none; }
        
        /* El CONTENEDOR flotante de FOP2 */
        #fop2-container {
            position: absolute;
            right: 20px;
            top: 50px;
            width: 330px;
            height: 550px;
            z-index: 9999;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            border-radius: 8px;
            background: white;
            overflow: hidden; /* Para que las esquinas redondeadas se mantengan */
        }

        /* La BARRA SUPERIOR para agarrar la ventana */
        #fop2-header {
            width: 100%;
            height: 30px;
            background-color: #2c3e50; /* Color azul oscuro profesional */
            color: white;
            text-align: center;
            line-height: 30px;
            cursor: move; /* Cambia el cursor a una cruz de movimiento */
            font-family: Arial, sans-serif;
            font-size: 14px;
            font-weight: bold;
            user-select: none;
        }

        /* El Iframe de FOP2 ahora se adapta a la caja */
        #fop2-frame {
            width: 100%;
            height: calc(100% - 30px); /* Ocupa todo menos la barra superior */
            border: none;
        }
    </style>
</head>
<body>

    <!-- IFrame principal: Issabel -->
    <iframe id="issabel-frame" src="/index.php?menu=agent_console"></iframe>

    <!-- La ventana flotante dinámica de FOP2 -->
    <div id="fop2-container">
        <!-- Barra superior para arrastrar -->
        <div id="fop2-header">≡ Teléfono FOP2 ≡</div>
        <!-- Iframe del teléfono -->
        <iframe id="fop2-frame" src="/fop2/" allow="microphone; camera"></iframe>
    </div>

    <!-- Script de la Magia: Arrastrar y Redimensionar -->
    <script>
        $(function() {
            // 1. Hacer que se pueda arrastrar (solo agarrándolo desde la barra superior)
            $("#fop2-container").draggable({
                handle: "#fop2-header", // De dónde se agarra
                containment: "window",  // Evita que lo saquen fuera de la pantalla
                iframeFix: true         // Truco para que el ratón no se trabe con el iframe
            });

            // 2. Hacer que se pueda redimensionar (agrandar o achicar desde los bordes)
            $("#fop2-container").resizable({
                minHeight: 300, // Altura mínima para no romperlo
                minWidth: 250,  // Ancho mínimo
                
                // Truco Pro: Cuando el agente empiece a cambiar el tamaño, desactivamos temporalmente 
                // los clics dentro del Iframe para que el ratón no se pierda.
                start: function(event, ui) {
                    $('#fop2-frame').css('pointer-events', 'none');
                },
                stop: function(event, ui) {
                    $('#fop2-frame').css('pointer-events', 'auto');
                }
            });
        });
    </script>

</body>
</html>
